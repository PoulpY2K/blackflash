name: Build Dockerfile and push to registry

on:
  workflow_run:
    workflows: [ "Java CI Build with Maven and SonarQube" ]
    types: [ completed ]
    branches-ignore: [ 'main' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run on successful push builds (not pull_request)
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lowercase image name
        env:
          REPO: ${{ github.repository }}
        run: echo "IMAGE_NAME_LOWER=${REPO,,}" >> $GITHUB_ENV

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: blackflash-jar
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize ref name for Docker tag
        id: ref
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          sanitized=$(echo "$HEAD_BRANCH" | sed 's/[/ ]/-/g')
          echo "sanitized=$sanitized" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003
        with:
          cosign-release: 'v3.0.5'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.workflow_run.head_branch }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.workflow_run.head_branch }}
            type=raw,value=${{ steps.ref.outputs.sanitized }}
            type=sha,format=short,value=${{ github.event.workflow_run.head_sha }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:build-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:build-cache,mode=max

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}