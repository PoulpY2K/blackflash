name: Deploy to production

on:
  workflow_run:
    workflows: [ "Build Dockerfile and push to registry" ]
    types: [ completed ]

jobs:
  check-tag:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      is-release: ${{ steps.validate.outputs.is-release }}
    steps:
      - name: Validate semver tag format (v*.*.*)
        id: validate
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if echo "$HEAD_BRANCH" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is-release=true" >> $GITHUB_OUTPUT
          else
            echo "is-release=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: check-tag
    runs-on: ubuntu-latest
    if: ${{ needs.check-tag.outputs.is-release == 'true' }}
    steps:
      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            ${{ secrets.SSH_SCRIPT }}